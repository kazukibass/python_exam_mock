<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>{% if is_correct %}正解{% else %}不正解{% endif %}</title>
</head>
<body>
  <h1>{% if is_correct %}正解！{% else %}不正解{% endif %}</h1>
  <p>あなたの回答: {{ selected }}</p>
  <p>正解: {{ correct }}</p>
  <p>現在の得点: {{ score }}/{{ total }}</p>
  <form action="{{ next_url }}" method="get">
    <button type="submit">{{ next_label }}</button>
  </form>
</body>
</html>
