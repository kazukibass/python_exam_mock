<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>問題 {{ current }}/{{ total }}</title>
</head>
<body>
  <h1>問題 {{ current }}/{{ total }}</h1>
  <p>{{ question.question }}</p>
  <pre>{{ question.code }}</pre>
  <form action="{{ url_for('answer') }}" method="post">
    <input type="hidden" name="qid" value="{{ qid }}">
    {% for choice in question.choices %}
      <div>
        <label>
          <input type="radio" name="choice" value="{{ choice }}" required>
          {{ loop.index }}: {{ choice }}
        </label>
      </div>
    {% endfor %}
    <button type="submit">回答する</button>
  </form>
</body>
</html>
